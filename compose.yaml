name: hangban

services:
  postgres:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hangban}
      POSTGRES_USER: ${POSTGRES_USER:-hangban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:8.8.0-alpine
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - --appendonly
      - 'yes'
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  migrate:
    profiles: [stack]
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    user: '10001:10001'
    command: ['pnpm', 'db:migrate']
    environment: &application-environment
      DATA_MODE: live
      LIVE_PROVIDERS: ${LIVE_PROVIDERS:-adsb-lol,airplanes-live,opensky}
      DATABASE_URL: postgresql://${POSTGRES_USER:-hangban}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hangban}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-hangban}
      LIVE_DEFAULT_BBOXES: ${LIVE_DEFAULT_BBOXES:-100,20,130,50}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:${WEB_PORT:-3000}}
      WEATHER_RADAR_ENABLED: ${WEATHER_RADAR_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: 'no'

  api:
    profiles: [stack]
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    user: '10001:10001'
    command: ['pnpm', '--filter', '@hangban/api', 'start']
    environment:
      <<: *application-environment
      API_HOST: 0.0.0.0
      API_PORT: 4000
    ports:
      - '127.0.0.1:${API_PORT:-4000}:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  ingestor:
    profiles: [stack]
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    user: '10001:10001'
    command: ['pnpm', '--filter', '@hangban/ingestor', 'start']
    environment: *application-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    profiles: [stack]
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://127.0.0.1:${API_PORT:-4000}
    user: '10001:10001'
    ports:
      - '127.0.0.1:${WEB_PORT:-3000}:3000'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  sync-airports:
    profiles: [tools]
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    user: '10001:10001'
    command: ['sh', '-c', 'pnpm data:airports:sync && pnpm data:db:sync']
    environment: *application-environment
    depends_on:
      postgres:
        condition: service_healthy

  sync-cities:
    profiles: [tools]
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    user: '10001:10001'
    command: ['sh', '-c', 'pnpm data:cities:sync && pnpm data:db:sync']
    environment:
      <<: *application-environment
      GEONAMES_CITIES_URL: file:///data/import/cities500.zip
      GEONAMES_ALTERNATE_NAMES_URL: file:///data/import/alternateNamesV2.zip
    volumes:
      - ./data/import:/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
